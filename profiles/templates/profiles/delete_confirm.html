{% extends "base.html" %}

{% block content %}
<div class="container py-4">
    <h1>Delete Profile</h1>
    <p>Are you sure you want to delete your account?</p>

    <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">
            Delete my account
        </button>
        <a href="{% url 'profiles:profile' %}" class="btn btn-secondary">
            Cancel
        </a>
    </form>
</div>
{% endblock %}
